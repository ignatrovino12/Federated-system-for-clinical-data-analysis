version: '3.8'

services:
  # Flower Federated Learning Server (Central)
  flower-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: healthcheck-flower-server
    command: python -u flower_server/server.py
    volumes:
      - ..:/app
    ports:
      - "8080:8080"
    environment:
      - FLOWER_HOST=0.0.0.0
      - FLOWER_PORT=8080
      - FLOWER_ROUNDS=5
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_USE_SSL=false
    networks:
      healthcheck_federated_net:
        aliases:
          - flower-server
          - healthcheck-flower-server
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 8080)); s.close()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
  minio:
    image: minio/minio:latest
    container_name: minio-server
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
      - ./minio.license:/root/.minio/license.lic
    command: minio server /data --console-address :9001
    networks:
      - healthcheck_federated_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  minio_data:

networks:
  healthcheck_federated_net:
    external: true
