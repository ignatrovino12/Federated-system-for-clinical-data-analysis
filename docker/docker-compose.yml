version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: healthcheck-postgres
    environment:
      POSTGRES_DB: healthcheck_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Celery
  redis:
    image: redis:7-alpine
    container_name: healthcheck-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Application
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: healthcheck-web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ..:/app
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

  # Celery Worker
  celery:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: healthcheck-celery
    command: celery -A healthcheck worker --loglevel=info
    volumes:
      - ..:/app
    env_file:
      - ../.env
    depends_on:
      - postgres
      - redis
      - web
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

  # Celery Beat (for scheduled tasks)
  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: healthcheck-celery-beat
    command: celery -A healthcheck beat --loglevel=info
    volumes:
      - ..:/app
    env_file:
      - ../.env
    depends_on:
      - postgres
      - redis
      - web
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

volumes:
  postgres_data:
