{% extends 'main/base.html' %}

{% block title %}Login - HealthCheck System{% endblock %}

{% block content %}
<div class="flex justify-center items-center min-h-[80vh]">
    <div class="bg-white p-12 rounded-2xl shadow-2xl w-full max-w-md">
        <h2 class="text-3xl font-bold text-primary mb-8 text-center">🏥 Clinic Personnel Login</h2>
        
        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label for="username" class="block mb-2 text-gray-700 font-medium">Username</label>
                <input type="text" id="username" name="username" required autofocus 
                       class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-primary transition-colors">
            </div>
            
            <div>
                <label for="password" class="block mb-2 text-gray-700 font-medium">Password</label>
                <input type="password" id="password" name="password" required 
                       class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-primary transition-colors">
            </div>
            
            <button type="submit" 
                    class="w-full py-3 bg-gradient-to-r from-primary to-secondary text-white font-semibold rounded-lg hover:-translate-y-1 transition-transform shadow-lg">
                Login
            </button>
        </form>
        
        <div class="mt-8 text-center text-gray-600">
            <p>HealthCheck Clinic Management System</p>
        </div>
    </div>
</div>
{% endblock %}
